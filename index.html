<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cambridge Court">
<meta name="theme-color" content="#1a2744">
<title>Cambridge Court Directory</title>

<style>
  :root {
    --navy: #1a2744;
    --navy-light: #243360;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f7f4ee;
    --cream-dark: #ede8de;
    --text: #1a1a2e;
    --text-muted: #6b6b80;
    --white: #ffffff;
    --card-bg: #ffffff;
    --divider: #e8e4da;
    --green: #2d7a4f;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(26,39,68,0.10);
    --shadow-lg: 0 8px 32px rgba(26,39,68,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .app-header {
    background: var(--navy);
    padding: 52px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo-area h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 0.01em;
    line-height: 1.1;
  }
  .logo-area p {
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .resident-count {
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 16px;
  }
  #searchInput {
    width: 100%;
    padding: 13px 42px 13px 42px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: var(--white);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 16px;
    font-weight: 400;
    outline: none;
    transition: background 0.2s;
    -webkit-appearance: none;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.45); }
  #searchInput:focus { background: rgba(255,255,255,0.18); }
  .clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .clear-btn.visible { display: flex; }

  /* ── Tabs ── */
  .tabs {
    background: var(--navy);
    display: flex;
    padding: 0 20px 14px;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }
  .tab-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
    font-weight: 600;
  }

  /* ── Main content ── */
  .content {
    padding: 16px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── Section headers ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 18px 4px 8px;
  }
  .section-label:first-child { padding-top: 4px; }

  /* ── Resident cards ── */
  .resident-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .resident-card:active { transform: scale(0.985); }

  .card-main {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 14px;
    cursor: pointer;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy-light), var(--navy));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 17px;
    color: var(--gold-light);
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bldg-pill {
    background: var(--cream-dark);
    color: var(--navy);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .call-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    color: white;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }
  .call-btn:active { transform: scale(0.9); background: #235f3d; }
  .no-phone .call-btn { background: #ccc; pointer-events: none; }

  /* ── Expanded phone details ── */
  .card-phones {
    display: none;
    padding: 0 16px 14px 74px;
    gap: 8px;
    flex-direction: column;
  }
  .card-phones.open { display: flex; }
  .phone-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .phone-row-left { display: flex; flex-direction: column; gap: 1px; }
  .phone-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .phone-number {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
    font-feature-settings: 'tnum';
  }
  .phone-row .call-btn {
    width: 36px;
    height: 36px;
    font-size: 15px;
  }
  .cell-badge {
    background: #e8f4ed;
    color: var(--green);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: 6px;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; color: var(--text-muted); }

  /* ── Highlight ── */
  mark {
    background: rgba(201,168,76,0.35);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--divider);
    display: flex;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 10px;
    font-weight: 500;
    transition: color 0.15s;
    padding: 0;
  }
  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--navy); }
  .nav-btn.active .nav-icon { filter: none; }

  /* ── Result count bar ── */
  .results-bar {
    font-size: 12px;
    color: var(--text-muted);
    padding: 12px 4px 4px;
    display: none;
  }
  .results-bar.visible { display: block; }
</style>
</head>

<header class="app-header">
  <div class="header-top">
    <div class="logo-area">
      <h1>Cambridge Court</h1>
      <p>Resident Directory</p>

</header>

<div class="tabs" id="tabBar">

<main class="content" id="content">

  </button>
  <button class="nav-btn" id="navBuilding" onclick="setView('building')">
    <span class="nav-icon">🏢</span>Building
  </button>
</nav>

// ── State ──────────────────────────────────────────────────────────────────
let currentView = 'search'; // search | alpha | building
let currentFilter = 'all';  // 'all' or building number
let query = '';
let openCard = null;

const withPhone = RESIDENTS.filter(r => r.phone || r.cell);
const totalCount = RESIDENTS.filter(r => r.full).length;

// ── Init tabs ──────────────────────────────────────────────────────────────
const buildings = [...new Set(RESIDENTS.map(r => r.building))].sort((a,b)=>a-b);
const tabBar = document.getElementById('tabBar');
buildings.forEach(b => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.dataset.filter = b;
  btn.textContent = `Bldg ${b}`;
  tabBar.appendChild(btn);
});
tabBar.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter === 'all' ? 'all' : parseInt(btn.dataset.filter);
  render();
});

document.getElementById('resCount').textContent = `${totalCount} residents`;

// ── Search ─────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
searchInput.addEventListener('input', () => {
  query = searchInput.value.trim();
  clearBtn.classList.toggle('visible', query.length > 0);
  render();
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  query = '';
  clearBtn.classList.remove('visible');
  searchInput.focus();
  render();
});

// ── View switching ─────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('navSearch').classList.toggle('active', v === 'search');
  document.getElementById('navAlpha').classList.toggle('active', v === 'alpha');
  document.getElementById('navBuilding').classList.toggle('active', v === 'building');
  tabBar.style.display = (v === 'building') ? 'flex' : 'none';
  if (v !== 'building') { currentFilter = 'all'; document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0)); }
  render();
}
tabBar.style.display = 'none';

// ── Helpers ────────────────────────────────────────────────────────────────
function initials(r) {
  if (!r.last) return '?';
  const f = r.first ? r.first[0] : '';
  const l = r.last[0];
  return (f + l).toUpperCase();
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function matches(r, q) {
  if (!q) return true;
  const ql = q.toLowerCase();
  return r.full.toLowerCase().includes(ql)
      || String(r.unit).includes(ql)
      || r.phone.includes(ql)
      || r.alt.includes(ql)
      || r.cell.includes(ql)
      || r.last.toLowerCase().includes(ql)
      || r.first.toLowerCase().includes(ql);
}

// ── Card builder ───────────────────────────────────────────────────────────
function buildCard(r, q, showBldg) {
  const hasPhone = r.phone || r.cell;
  const multiPhone = [r.phone, r.alt, r.cell].filter(Boolean).length > 1;
  const primaryPhone = r.phone || r.cell || '';
  const callHref = hasPhone ? `tel:${primaryPhone.replace(/\D/g,'')}` : '#';

  const card = document.createElement('div');
  card.className = 'resident-card' + (!hasPhone ? ' no-phone' : '');
  card.dataset.unit = r.unit;

  // Main row
  const main = document.createElement('div');
  main.className = 'card-main';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = initials(r);

  const info = document.createElement('div');
  info.className = 'card-info';

  const name = document.createElement('div');
  name.className = 'card-name';
  name.innerHTML = highlight(r.full || `Unit ${r.unit}`, q);

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.innerHTML = `<span>Unit ${r.unit}</span>`;
  if (showBldg) meta.innerHTML += `<span class="bldg-pill">Bldg ${r.building}</span>`;
  if (r.phone && !multiPhone) meta.innerHTML += `<span>${highlight(r.phone, q)}</span>`;

  info.appendChild(name);
  info.appendChild(meta);

  const callBtn = document.createElement('a');
  callBtn.className = 'call-btn';
  callBtn.href = callHref;
  callBtn.setAttribute('aria-label', 'Call');
  callBtn.innerHTML = '📞';
  callBtn.addEventListener('click', e => e.stopPropagation());

  main.appendChild(avatar);
  main.appendChild(info);
  main.appendChild(callBtn);
  card.appendChild(main);

  // Expanded phones panel
  if (multiPhone || r.cell) {
    const phones = document.createElement('div');
    phones.className = 'card-phones';

    if (r.phone) phones.appendChild(phoneRow('Home', r.phone, q));
    if (r.alt)   phones.appendChild(phoneRow('Alternate', r.alt, q));
    if (r.cell)  phones.appendChild(phoneRow('Cell', r.cell, q, true));

    card.appendChild(phones);

    main.addEventListener('click', () => {
      const isOpen = phones.classList.contains('open');
      if (openCard && openCard !== phones) openCard.classList.remove('open');
      phones.classList.toggle('open', !isOpen);
      openCard = isOpen ? null : phones;
    });
  } else if (hasPhone) {
    main.addEventListener('click', () => {
      window.location.href = callHref;
    });
  }

  return card;
}

function phoneRow(label, number, q, isCell) {
  const row = document.createElement('div');
  row.className = 'phone-row';
  const left = document.createElement('div');
  left.className = 'phone-row-left';
  const lbl = document.createElement('div');
  lbl.className = 'phone-label';
  lbl.innerHTML = label;
  const num = document.createElement('div');
  num.className = 'phone-number';
  num.innerHTML = highlight(number, q);
  left.appendChild(lbl);
  left.appendChild(num);
  const btn = document.createElement('a');
  btn.className = 'call-btn';
  btn.href = `tel:${number.replace(/\D/g,'')}`;
  btn.innerHTML = '📞';
  btn.setAttribute('aria-label', `Call ${label}`);
  row.appendChild(left);
  row.appendChild(btn);
  return row;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  const emptyState = document.getElementById('emptyState');
  openCard = null;
  content.innerHTML = '';
  content.appendChild(emptyState);

  let list = RESIDENTS.filter(r => r.full);

  // Filter by building if needed
  if (currentFilter !== 'all') {
    list = list.filter(r => r.building === currentFilter);
  }

  // Filter by search query
  if (query) {
    list = list.filter(r => matches(r, query));
  }

  if (list.length === 0) {
    emptyState.classList.add('visible');
    return;
  }
  emptyState.classList.remove('visible');

  const showBldg = (currentView !== 'building' && currentFilter === 'all');

  if (currentView === 'alpha' && !query) {
    // Group alphabetically by last name
    const sorted = [...list].sort((a,b) => a.last.localeCompare(b.last) || a.first.localeCompare(b.first));
    let lastLetter = '';
    sorted.forEach((r, i) => {
      const letter = r.last[0].toUpperCase();
      if (letter !== lastLetter) {
        lastLetter = letter;
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = letter;
        label.style.animationDelay = (i * 0.01) + 's';
        content.appendChild(label);
      }
      const card = buildCard(r, query, showBldg);
      card.style.animationDelay = (i * 0.015) + 's';
      content.appendChild(card);
    });

  } else if (currentView === 'building' && !query) {
    // Group by building
    const grouped = {};
    list.forEach(r => { (grouped[r.building] = grouped[r.building]||[]).push(r); });
    let idx = 0;
    Object.keys(grouped).sort((a,b)=>a-b).forEach(b => {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = `Building ${b}`;
      content.appendChild(label);
      grouped[b].sort((a,c)=>a.unit-c.unit).forEach(r => {
        const card = buildCard(r, query, false);
        card.style.animationDelay = (idx++ * 0.012) + 's';
        content.appendChild(card);
      });
    });

  } else {
    // Search results or default — sort by last name
    const sorted = [...list].sort((a,b) => a.last.localeCompare(b.last) || a.first.localeCompare(b.first));
    sorted.forEach((r, i) => {
      const card = buildCard(r, query, showBldg);
      card.style.animationDelay = (i * 0.012) + 's';
      content.appendChild(card);
    });
  }

  // Result count when searching
  if (query) {
    const bar = document.createElement('div');
    bar.className = 'results-bar visible';
    bar.textContent = `${list.length} result${list.length !== 1 ? 's' : ''} for "${query}"`;
    content.insertBefore(bar, content.firstChild);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
render();
</script>
