<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cambridge Court">
<meta name="theme-color" content="#1a2744">
<title>Cambridge Court Directory</title>

<style>
  :root {
    --navy: #1a2744;
    --navy-light: #243360;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f7f4ee;
    --cream-dark: #ede8de;
    --text: #1a1a2e;
    --text-muted: #6b6b80;
    --white: #ffffff;
    --card-bg: #ffffff;
    --divider: #e8e4da;
    --green: #2d7a4f;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(26,39,68,0.10);
    --shadow-lg: 0 8px 32px rgba(26,39,68,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .app-header {
    background: var(--navy);
    padding: 52px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo-area h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 0.01em;
    line-height: 1.1;
  }
  .logo-area p {
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .resident-count {
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* ── Search ── */
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 16px;
  }
  #searchInput {
    width: 100%;
    padding: 13px 42px 13px 42px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: var(--white);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 16px;
    font-weight: 400;
    outline: none;
    transition: background 0.2s;
    -webkit-appearance: none;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.45); }
  #searchInput:focus { background: rgba(255,255,255,0.18); }
  .clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .clear-btn.visible { display: flex; }

  /* ── Tabs ── */
  .tabs {
    background: var(--navy);
    display: flex;
    padding: 0 20px 14px;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }
  .tab-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
    font-weight: 600;
  }

  /* ── Main content ── */
  .content {
    padding: 16px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── Loading / error ── */
  .status-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .status-msg .icon { font-size: 40px; margin-bottom: 12px; }
  .status-msg.error { color: #c0392b; }

  /* ── Section headers ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 18px 4px 8px;
  }
  .section-label:first-child { padding-top: 4px; }

  /* ── Resident cards ── */
  .resident-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .resident-card:active { transform: scale(0.985); }

  .card-main {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 14px;
    cursor: pointer;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy-light), var(--navy));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 17px;
    color: var(--gold-light);
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bldg-pill {
    background: var(--cream-dark);
    color: var(--navy);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .call-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    color: white;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }
  .call-btn:active { transform: scale(0.9); background: #235f3d; }
  .no-phone .call-btn { background: #ccc; pointer-events: none; }

  /* ── Expanded phone details ── */
  .card-phones {
    display: none;
    padding: 0 16px 14px 74px;
    gap: 8px;
    flex-direction: column;
  }
  .card-phones.open { display: flex; }
  .phone-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .phone-row-left { display: flex; flex-direction: column; gap: 1px; }
  .phone-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .phone-number {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
    font-feature-settings: 'tnum';
  }
  .phone-row .call-btn { width: 36px; height: 36px; font-size: 15px; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; color: var(--text-muted); }

  /* ── Board badge ── */
  .board-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(201,168,76,0.18);
    border: 1px solid rgba(201,168,76,0.5);
    color: #8a6a1a;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .prop-mgr-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(26,39,68,0.10);
    border: 1px solid rgba(26,39,68,0.25);
    color: var(--navy);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .avatar.board-avatar {
    background: linear-gradient(135deg, #b8860b, #8a6a1a);
  }
  .avatar.mgr-avatar {
    background: linear-gradient(135deg, var(--navy), #0d1830);
  }

  /* ── Highlight ── */
  mark {
    background: rgba(201,168,76,0.35);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--divider);
    display: flex;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 10px;
    font-weight: 500;
    transition: color 0.15s;
    padding: 0;
  }
  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--navy); }

  /* ── Result count bar ── */
  .results-bar {
    font-size: 12px;
    color: var(--text-muted);
    padding: 12px 4px 4px;
    display: none;
  }
  .results-bar.visible { display: block; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="logo-area">
      <h1>Cambridge Court</h1>
      <p>Resident Directory</p>
    </div>
    <span class="resident-count" id="resCount">Loading…</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="Search by name, unit, or phone…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" aria-label="Clear search">✕</button>
  </div>
</header>

<div class="tabs" id="tabBar">
  <button class="tab-btn active" data-filter="all">All</button>
</div>

<main class="content" id="content">
  <div class="status-msg" id="statusMsg">
    <div class="icon">⏳</div>
    Loading directory…
  </div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🔍</div>
    <h3>No results found</h3>
    <p>Try searching by name, unit number, or phone number.</p>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navSearch" onclick="setView('search')">
    <span class="nav-icon">🔍</span>Search
  </button>
  <button class="nav-btn" id="navAlpha" onclick="setView('alpha')">
    <span class="nav-icon">🔤</span>A–Z
  </button>
  <button class="nav-btn" id="navBuilding" onclick="setView('building')">
    <span class="nav-icon">🏢</span>Building
  </button>
  <button class="nav-btn" id="navBoard" onclick="setView('board')">
    <span class="nav-icon">⭐</span>Board
  </button>
</nav>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIGURATION
//  Replace SHEET_URL with your published Google Sheet CSV URL.
//
//  Your Google Sheet should have these column headers in Row 1:
//    unit | building | full | first | last | phone | cell | cell1name | cell2 | cell2name | board | boardName | boardTitle | propMgr
//
//  Column notes:
//    unit      — unit number (e.g. 101)
//    building  — building number (e.g. 1)
//    full      — full display name (e.g. "John and Mary Smith")
//    first     — first name(s) only (e.g. "John and Mary")
//    last      — last name only (e.g. "Smith")
//    phone     — home/landline phone number (e.g. 516-555-1234)
//    cell      — first cell phone (e.g. Mary's cell)
//    cell1name — name label for first cell (e.g. "Mary") — shown as "Cell – Mary"
//    cell2     — second cell phone (e.g. John's cell)
//    cell2name — name label for second cell (e.g. "John") — shown as "Cell – John"
//    board     — type "yes" if this resident is a Board Member
//    boardName — if only one of two owners is on the board, enter their first name
//                (e.g. "Mary") — the card will show "Mary Smith" instead of "John and Mary Smith"
//    boardTitle — board role (e.g. President, VP, Secretary, Treasurer) — shown in the badge
//    propMgr   — type "yes" for the Property Manager (no unit needed)
//
//  Leave a row blank (only unit and building filled in) for
//  vacant units — they will be skipped in the display.
// ═══════════════════════════════════════════════════════════════════

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2dLJ8pqO81vBivd0PZZXGgjXj4rIAQLSVD677IrBY7Lr3qsITi4mrOUCqtP9aASio/exec";
// ── Case-insensitive field getter ──────────────────────────────────
function getField(r, key) {
  if (r[key] !== undefined) return String(r[key]);
  const lk = key.toLowerCase();
  for (const k of Object.keys(r)) {
    if (k.toLowerCase() === lk) return String(r[k]);
  }
  return '';
}

// ── Normalise a row from Apps Script JSON ──────────────────────────
function normaliseRow(r) {
  return {
    unit:      parseInt(r.unit)      || 0,
    building:  parseInt(r.building)  || 0,
    full:      String(r.full   || '').trim(),
    first:     String(r.first  || '').trim(),
    last:      String(r.last   || '').trim(),
    phone:     String(r.phone  || '').trim(),
    cell:      String(r.cell   || '').trim(),
    cell2:     String(r.cell2  || '').trim(),       // second person's cell
    cell2name: String(r.cell2name || '').trim(),    // name label for cell2 (e.g. "John")
    cell1name: String(r.cell1name || '').trim(),    // name label for cell  (e.g. "Mary")
    board:      getField(r, 'board').trim().toLowerCase() === 'yes',
    boardName:  String(r.boardName  || '').trim(),   // first name of the board member if unit has 2 owners
    boardTitle: String(r.boardTitle || '').trim(),   // e.g. President, VP, Secretary, Treasurer
    propMgr:    getField(r, 'propMgr').trim().toLowerCase() === 'yes',
    alt:       String(r.alt    || '').trim(),
  };
}

// ── State ──────────────────────────────────────────────────────────
let RESIDENTS = [];
let currentView   = 'search';
let currentFilter = 'all';
let query = '';
let openCard = null;

// ── Helpers ────────────────────────────────────────────────────────
function initials(r) {
  if (!r.last) return '?';
  const f = r.first ? r.first[0] : '';
  return (f + r.last[0]).toUpperCase();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function matches(r, q) {
  if (!q) return true;
  const ql = q.toLowerCase();
  return r.full.toLowerCase().includes(ql)
      || String(r.unit).includes(ql)
      || r.phone.includes(ql)
      || r.cell.includes(ql)
      || r.cell2.includes(ql)
      || r.last.toLowerCase().includes(ql)
      || r.first.toLowerCase().includes(ql);
}

// ── Phone row builder ──────────────────────────────────────────────
function phoneRow(label, number, q) {
  const row = document.createElement('div');
  row.className = 'phone-row';
  const left = document.createElement('div');
  left.className = 'phone-row-left';
  const lbl = document.createElement('div');
  lbl.className = 'phone-label';
  lbl.textContent = label;
  const num = document.createElement('div');
  num.className = 'phone-number';
  num.innerHTML = highlight(number, q);
  left.appendChild(lbl);
  left.appendChild(num);
  const btn = document.createElement('a');
  btn.className = 'call-btn';
  btn.href = `tel:${number.replace(/\D/g,'')}`;
  btn.innerHTML = '📞';
  btn.setAttribute('aria-label', `Call ${label}`);
  row.appendChild(left);
  row.appendChild(btn);
  return row;
}

// ── Card builder ───────────────────────────────────────────────────
// displayOverride: if provided, shown as the card name instead of r.full
function buildCard(r, q, showBldg, displayOverride = null) {
  const phones = [r.phone, r.cell, r.cell2].filter(Boolean);
  const hasPhone   = phones.length > 0;
  const multiPhone = phones.length > 1;
  const primaryPhone = phones[0] || '';
  const callHref = hasPhone ? `tel:${primaryPhone.replace(/\D/g,'')}` : '#';

  const card = document.createElement('div');
  card.className = 'resident-card' + (!hasPhone ? ' no-phone' : '');
  card.dataset.unit = r.unit;

  const main = document.createElement('div');
  main.className = 'card-main';

  const avatar = document.createElement('div');
  avatar.className = 'avatar' + (r.board ? ' board-avatar' : r.propMgr ? ' mgr-avatar' : '');
  avatar.textContent = initials(r);

  const info = document.createElement('div');
  info.className = 'card-info';

  const name = document.createElement('div');
  name.className = 'card-name';
  // displayOverride is only passed from the Board tab render path
  const displayName = displayOverride
    ? highlight(displayOverride, q)
    : highlight(r.full || `Unit ${r.unit}`, q);
  name.innerHTML = displayName;

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  if (r.propMgr) {
    meta.innerHTML = `<span class="prop-mgr-badge">🏠 Property Manager</span>`;
  } else {
    meta.innerHTML = `<span>Unit ${r.unit}</span>`;
    if (showBldg) meta.innerHTML += `<span class="bldg-pill">Bldg ${r.building}</span>`;
    if (r.board) {
      const badgeParts = ['⭐'];
      if (r.boardTitle) badgeParts.push(r.boardTitle);
      else badgeParts.push('Board');
      meta.innerHTML += `<span class="board-badge">${badgeParts.join(' ')}</span>`;
    }
    if (!multiPhone && phones.length === 1) meta.innerHTML += `<span>${highlight(primaryPhone, q)}</span>`;
  }

  info.appendChild(name);
  info.appendChild(meta);

  // For multi-phone cards the right-side button expands the panel (chevron),
  // not the call button — so the entire card row is a safe tap target.
  const actionBtn = document.createElement(multiPhone ? 'button' : 'a');
  actionBtn.className = 'call-btn';
  if (multiPhone) {
    actionBtn.type = 'button';
    actionBtn.innerHTML = '›';
    actionBtn.style.cssText = 'font-size:22px;font-weight:300;line-height:1;background:var(--navy-light);';
    actionBtn.setAttribute('aria-label', 'Show phone numbers');
  } else {
    actionBtn.href = hasPhone ? callHref : '#';
    actionBtn.innerHTML = '📞';
    actionBtn.setAttribute('aria-label', 'Call');
  }
  actionBtn.addEventListener('click', e => e.stopPropagation());

  main.appendChild(avatar);
  main.appendChild(info);
  main.appendChild(actionBtn);
  card.appendChild(main);

  // Expanded phones panel
  if (multiPhone) {
    const phonesPanel = document.createElement('div');
    phonesPanel.className = 'card-phones';

    if (r.phone) phonesPanel.appendChild(phoneRow('Home', r.phone, q));

    if (r.cell) {
      const cellLabel = r.cell1name ? `Cell – ${r.cell1name}` : 'Cell';
      phonesPanel.appendChild(phoneRow(cellLabel, r.cell, q));
    }

    if (r.cell2) {
      const cell2Label = r.cell2name ? `Cell – ${r.cell2name}` : 'Cell 2';
      phonesPanel.appendChild(phoneRow(cell2Label, r.cell2, q));
    }

    card.appendChild(phonesPanel);

    const togglePanel = () => {
      const isOpen = phonesPanel.classList.contains('open');
      if (openCard && openCard !== phonesPanel) openCard.classList.remove('open');
      phonesPanel.classList.toggle('open', !isOpen);
      actionBtn.innerHTML = isOpen ? '›' : '‹';
      openCard = isOpen ? null : phonesPanel;
    };
    main.addEventListener('click', togglePanel);
    actionBtn.addEventListener('click', e => { e.stopPropagation(); togglePanel(); });

  } else if (hasPhone) {
    main.addEventListener('click', () => { window.location.href = callHref; });
  }

  return card;
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const content    = document.getElementById('content');
  const emptyState = document.getElementById('emptyState');
  openCard = null;
  content.innerHTML = '';
  content.appendChild(emptyState);

  // Board view — separate logic
  if (currentView === 'board' && !query) {
    const propMgrs    = RESIDENTS.filter(r => r.propMgr);
    const boardMembers = RESIDENTS.filter(r => r.board && r.full);

    let idx = 0;

    if (boardMembers.length) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = 'Board Members';
      content.appendChild(label);
      [...boardMembers].sort((a,b) => {
          const aName = a.boardName || a.first;
          const bName = b.boardName || b.first;
          return a.last.localeCompare(b.last) || aName.localeCompare(bName);
        })
        .forEach(r => {
          const nameOverride = r.boardName ? r.boardName + ' ' + r.last : null;
          const card = buildCard(r, '', true, nameOverride);
          card.style.animationDelay = (idx++ * 0.015) + 's';
          content.appendChild(card);
        });
    }

    if (propMgrs.length) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = 'Property Manager';
      content.appendChild(label);
      propMgrs.forEach(r => {
        const card = buildCard(r, '', true);
        card.style.animationDelay = (idx++ * 0.015) + 's';
        content.appendChild(card);
      });
    }

    if (!propMgrs.length && !boardMembers.length) {
      emptyState.classList.add('visible');
    } else {
      emptyState.classList.remove('visible');
    }
    return;
  }

  let list = RESIDENTS.filter(r => r.full);
  if (currentView === 'building') list = list.filter(r => r.building > 0);
  if (currentFilter !== 'all') list = list.filter(r => r.building === currentFilter);
  if (query) list = list.filter(r => matches(r, query));

  if (list.length === 0) { emptyState.classList.add('visible'); return; }
  emptyState.classList.remove('visible');

  const showBldg = (currentView !== 'building' && currentFilter === 'all');

  if (currentView === 'alpha' && !query) {
    const sorted = [...list].sort((a,b) => a.first.localeCompare(b.first) || a.last.localeCompare(b.last));
    let lastLetter = '';
    sorted.forEach((r, i) => {
      const letter = r.first[0].toUpperCase();
      if (letter !== lastLetter) {
        lastLetter = letter;
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = letter;
        content.appendChild(label);
      }
      const card = buildCard(r, query, showBldg);
      card.style.animationDelay = (i * 0.015) + 's';
      content.appendChild(card);
    });

  } else if (currentView === 'building' && !query) {
    const grouped = {};
    list.forEach(r => { (grouped[r.building] = grouped[r.building]||[]).push(r); });
    let idx = 0;
    Object.keys(grouped).sort((a,b) => a - b).forEach(b => {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = `Building ${b}`;
      content.appendChild(label);
      grouped[b].sort((a,c) => a.unit - c.unit).forEach(r => {
        const card = buildCard(r, query, false);
        card.style.animationDelay = (idx++ * 0.012) + 's';
        content.appendChild(card);
      });
    });

  } else {
    const sorted = [...list].sort((a,b) => a.first.localeCompare(b.first) || a.last.localeCompare(b.last));
    sorted.forEach((r, i) => {
      const card = buildCard(r, query, showBldg);
      card.style.animationDelay = (i * 0.012) + 's';
      content.appendChild(card);
    });
  }

  if (query) {
    const bar = document.createElement('div');
    bar.className = 'results-bar visible';
    bar.textContent = `${list.length} result${list.length !== 1 ? 's' : ''} for "${query}"`;
    content.insertBefore(bar, content.firstChild);
  }
}

// ── View switching ─────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('navSearch').classList.toggle('active', v === 'search');
  document.getElementById('navAlpha').classList.toggle('active', v === 'alpha');
  document.getElementById('navBuilding').classList.toggle('active', v === 'building');
  document.getElementById('navBoard').classList.toggle('active', v === 'board');
  tabBar.style.display = (v === 'building') ? 'flex' : 'none';
  if (v !== 'building') {
    currentFilter = 'all';
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i === 0));
  }
  render();
}

// ── Search ─────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const clearBtn    = document.getElementById('clearBtn');
searchInput.addEventListener('input', () => {
  query = searchInput.value.trim();
  clearBtn.classList.toggle('visible', query.length > 0);
  render();
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  query = '';
  clearBtn.classList.remove('visible');
  searchInput.focus();
  render();
});

// ── Init tabs ──────────────────────────────────────────────────────
const tabBar = document.getElementById('tabBar');
tabBar.style.display = 'none';

function initTabs() {
  const buildings = [...new Set(RESIDENTS.filter(r => r.building > 0).map(r => r.building))].sort((a,b) => a - b);
  // Remove ALL existing building buttons (keep only "All")
  tabBar.querySelectorAll('.tab-btn').forEach(b => { if (b.dataset.filter !== 'all') b.remove(); });
  buildings.forEach(b => {
    if (b <= 0) return;  // never create a building 0 tab
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.filter = b;
    btn.textContent = `Bldg ${b}`;
    tabBar.appendChild(btn);
  });
}

tabBar.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter === 'all' ? 'all' : parseInt(btn.dataset.filter);
  render();
});

// ── Load data from Apps Script ─────────────────────────────────────
async function loadData() {
  const statusMsg = document.getElementById('statusMsg');
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error('Network error');
    const rows = await res.json();
    RESIDENTS = rows.map(normaliseRow);
    const totalCount = RESIDENTS.filter(r => r.full).length;
    document.getElementById('resCount').textContent = `${totalCount} residents`;
    statusMsg.style.display = 'none';
    initTabs();
    render();
  } catch (err) {
    statusMsg.className = 'status-msg error';
    statusMsg.innerHTML = '<div class="icon">⚠️</div>Unable to load directory.<br>Please try again later.';
    document.getElementById('resCount').textContent = 'Unavailable';
  }
}

loadData();
</script>
